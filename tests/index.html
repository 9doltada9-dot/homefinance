<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HomeFinance · Unit Tests</title>
<style>
  body{font-family:system-ui,sans-serif;background:#fafaf8;color:#0f0f0f;padding:24px;max-width:980px;margin:0 auto}
  h1{font-size:22px;margin:0 0 6px}
  .sub{color:#666;font-size:13px;margin-bottom:16px}
  .summary{padding:12px 16px;border-radius:10px;background:#fff;border:1px solid #e8e6e0;margin-bottom:16px;display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .summary .num{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700}
  .pass{color:#1a7a4a}.fail{color:#c0392b}
  .suite{margin-top:18px;background:#fff;border:1px solid #e8e6e0;border-radius:10px;overflow:hidden}
  .suite-head{padding:10px 14px;background:#f4f3ef;font-size:13px;font-weight:600;border-bottom:1px solid #e8e6e0;display:flex;justify-content:space-between}
  .case{padding:8px 14px;border-bottom:1px solid #f0eee9;font-size:13px;display:flex;gap:10px;align-items:flex-start}
  .case:last-child{border-bottom:none}
  .case .ico{font-family:monospace;font-weight:700;width:18px;flex-shrink:0}
  .case.ok .ico{color:#1a7a4a}
  .case.no .ico{color:#c0392b}
  .case .body{flex:1}
  .case pre{margin:6px 0 0;background:#fdf0ee;padding:8px;border-radius:6px;font-size:11px;color:#c0392b;white-space:pre-wrap;word-break:break-word}
  button{padding:8px 14px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:13px}
  button.primary{background:#0f0f0f;color:#fff;border-color:#0f0f0f}
  .controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .duration{color:#999;font-size:11px;margin-left:6px}
</style>
</head>
<body>
  <h1>HomeFinance · Unit Tests</h1>
  <div class="sub">เปิดไฟล์นี้ในเบราว์เซอร์เพื่อรัน test สำหรับ logic ของ salary cycle, settlement, budget, recurring, CSV escape</div>
  <div class="controls">
    <button class="primary" onclick="runAll()">▶ รันทุก test</button>
    <a href="../index.html"><button>← กลับไปแอป</button></a>
  </div>
  <div class="summary" id="summary">
    <div><span class="num pass" id="passCount">0</span> ผ่าน</div>
    <div><span class="num fail" id="failCount">0</span> ไม่ผ่าน</div>
    <div><span class="num" id="totalCount">0</span> ทั้งหมด</div>
    <div class="duration" id="duration"></div>
  </div>
  <div id="results"></div>

  <!-- โหลดเฉพาะ module ที่จำเป็นสำหรับ test (logic-only, ไม่ touch DOM ของแอปจริง) -->
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/salary.js"></script>
  <script src="../assets/js/features.js"></script>

  <!-- ─── TEST FRAMEWORK (มินิมอล, ไม่ต้องพึ่ง dependency) ─── -->
  <script>
  (function(){
    var suites = [];
    var current = null;

    window.describe = function(name, fn){
      current = { name: name, cases: [] };
      suites.push(current);
      try { fn(); } catch(err){
        current.cases.push({ name: '(suite setup)', ok:false, err: err.message });
      }
      current = null;
    };

    window.it = function(name, fn){
      if (!current){ throw new Error('it() must be inside describe()'); }
      var ok = true, errMsg = '';
      try { fn(); }
      catch(err){ ok = false; errMsg = err.message + (err.stack ? '\n'+err.stack.split('\n').slice(1,3).join('\n') : ''); }
      current.cases.push({ name: name, ok: ok, err: errMsg });
    };

    window.expect = function(actual){
      return {
        toBe: function(expected){
          if (actual !== expected) throw new Error('expected '+JSON.stringify(expected)+' but got '+JSON.stringify(actual));
        },
        toEqual: function(expected){
          if (JSON.stringify(actual) !== JSON.stringify(expected))
            throw new Error('expected '+JSON.stringify(expected)+' but got '+JSON.stringify(actual));
        },
        toBeTruthy: function(){
          if (!actual) throw new Error('expected truthy but got '+JSON.stringify(actual));
        },
        toBeFalsy: function(){
          if (actual) throw new Error('expected falsy but got '+JSON.stringify(actual));
        },
        toBeGreaterThan: function(n){
          if (!(actual > n)) throw new Error('expected >'+n+' but got '+actual);
        },
        toBeLessThan: function(n){
          if (!(actual < n)) throw new Error('expected <'+n+' but got '+actual);
        },
        toContain: function(item){
          if (!actual || actual.indexOf(item) === -1)
            throw new Error('expected to contain '+JSON.stringify(item)+' in '+JSON.stringify(actual));
        },
      };
    };

    window.runAll = function(){
      var t0 = performance.now();
      var pass = 0, fail = 0, total = 0;
      var html = '';
      suites.forEach(function(s){
        var sp = 0, sf = 0;
        var cases = s.cases.map(function(c){
          total++;
          if (c.ok){ pass++; sp++; return '<div class="case ok"><span class="ico">✓</span><div class="body">'+escapeHtml(c.name)+'</div></div>'; }
          else { fail++; sf++; return '<div class="case no"><span class="ico">✗</span><div class="body">'+escapeHtml(c.name)+'<pre>'+escapeHtml(c.err||'')+'</pre></div></div>'; }
        }).join('');
        html += '<div class="suite"><div class="suite-head">'+escapeHtml(s.name)+'<span>'+sp+' ผ่าน · '+sf+' ไม่ผ่าน</span></div>'+cases+'</div>';
      });
      document.getElementById('results').innerHTML = html;
      document.getElementById('passCount').textContent = pass;
      document.getElementById('failCount').textContent = fail;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('duration').textContent = '('+Math.round(performance.now()-t0)+' ms)';
    };

    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
  })();
  </script>

  <!-- ─── TEST SUITES ─── -->
  <script src="suite.salary.js"></script>
  <script src="suite.settlement.js"></script>
  <script src="suite.budget.js"></script>
  <script src="suite.recurring.js"></script>
  <script src="suite.csv.js"></script>

  <script>
    // auto-run on load
    window.addEventListener('load', function(){ runAll(); });
  </script>
</body>
</html>
